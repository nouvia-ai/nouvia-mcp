name: Deploy Firestore Indexes

# This workflow deploys INDEXES ONLY (triggered by index file changes).
# Hosting is deployed by deploy-hosting.yml (triggered on every push to main).
# Firestore rules are managed separately.

on:
  push:
    branches:
      - main
    paths:
      - 'firestore.indexes.json'

jobs:
  deploy-indexes:
    name: Deploy Firestore Indexes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy Firestore Indexes
        run: npx firebase-tools deploy --only firestore:indexes --project nouvia-os --non-interactive
