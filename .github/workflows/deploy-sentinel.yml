name: Deploy Sentinel Reporter

on:
  push:
    branches: [main]
    paths:
      - 'services/sentinel-reporter/**'
  workflow_dispatch:  # Manual trigger

env:
  PROJECT_ID: nouvia-os
  REGION: us-central1
  JOB_NAME: sentinel-reporter
  IMAGE: gcr.io/nouvia-os/sentinel-reporter

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_GHA_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push container
        run: |
          cd services/sentinel-reporter
          gcloud builds submit --tag ${{ env.IMAGE }}:${{ github.sha }} --tag ${{ env.IMAGE }}:latest

      - name: Update Cloud Run job
        run: |
          gcloud run jobs update ${{ env.JOB_NAME }} \
            --region=${{ env.REGION }} \
            --image=${{ env.IMAGE }}:${{ github.sha }}
